name: Deploy ke Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # diperlukan untuk Workload Identity Federation

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      IMAGE: asia-southeast2-docker.pkg.dev/sicapai-paud/cloud-run-source-deploy/sicapai:${{ github.sha }}

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Autentikasi ke Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Konfigurasi Docker untuk Artifact Registry
        run: gcloud auth configure-docker asia-southeast2-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.VITE_FIREBASE_APP_ID }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            -t "$IMAGE" .

      - name: Push image ke Artifact Registry
        run: docker push "$IMAGE"

      - name: Deploy ke Cloud Run
        run: |
          gcloud run deploy sicapai \
            --image="$IMAGE" \
            --region=asia-southeast2 \
            --project=sicapai-paud \
            --allow-unauthenticated \
            --quiet
