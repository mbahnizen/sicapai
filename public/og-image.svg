<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#091A19"/>
    </linearGradient>
    <radialGradient id="glow1" cx="900" cy="120" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="200" cy="510" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative circles top-right -->
  <circle cx="1080" cy="120" r="180" fill="none" stroke="#0D9488" stroke-width="1.5" opacity="0.15"/>
  <circle cx="1080" cy="120" r="240" fill="none" stroke="#0D9488" stroke-width="1" opacity="0.08"/>
  <circle cx="1080" cy="120" r="80" fill="#0D9488" opacity="0.07"/>

  <!-- Decorative circles bottom-left -->
  <circle cx="120" cy="550" r="130" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.12"/>
  <circle cx="120" cy="550" r="80" fill="#14B8A6" opacity="0.05"/>

  <!-- Dot grid pattern (subtle) -->
  <g fill="#0D9488" opacity="0.12">
    <circle cx="820" cy="300" r="2.5"/><circle cx="860" cy="300" r="2.5"/><circle cx="900" cy="300" r="2.5"/>
    <circle cx="940" cy="300" r="2.5"/><circle cx="980" cy="300" r="2.5"/>
    <circle cx="820" cy="340" r="2.5"/><circle cx="860" cy="340" r="2.5"/><circle cx="900" cy="340" r="2.5"/>
    <circle cx="940" cy="340" r="2.5"/><circle cx="980" cy="340" r="2.5"/>
    <circle cx="820" cy="380" r="2.5"/><circle cx="860" cy="380" r="2.5"/><circle cx="900" cy="380" r="2.5"/>
    <circle cx="940" cy="380" r="2.5"/><circle cx="980" cy="380" r="2.5"/>
    <circle cx="820" cy="420" r="2.5"/><circle cx="860" cy="420" r="2.5"/><circle cx="900" cy="420" r="2.5"/>
    <circle cx="940" cy="420" r="2.5"/><circle cx="980" cy="420" r="2.5"/>
  </g>

  <!-- Left accent bar -->
  <rect x="80" y="190" width="6" height="250" rx="3" fill="#0D9488"/>

  <!-- "Si" — white -->
  <text x="112" y="330"
    font-size="148" font-weight="800"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="white" letter-spacing="-4">Si</text>

  <!-- "CAPAI" — teal -->
  <text x="340" y="330"
    font-size="148" font-weight="800"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#14B8A6" letter-spacing="-4">CAPAI</text>

  <!-- Subtitle -->
  <text x="112" y="392"
    font-size="32" font-weight="500"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#9CA3AF" letter-spacing="0.5">Sistem Catatan Capaian Anak</text>

  <!-- Description -->
  <text x="112" y="446"
    font-size="26" font-weight="400"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#6B7280">Generator narasi rapor PAUD/TK otomatis berbasis AI &amp; Kurikulum Merdeka</text>

  <!-- Feature badges -->
  <!-- Badge 1: Kurikulum Merdeka -->
  <rect x="112" y="490" width="226" height="44" rx="22" fill="#0D9488" fill-opacity="0.15" stroke="#0D9488" stroke-width="1.5"/>
  <text x="225" y="518" font-size="19" font-weight="600"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#14B8A6" text-anchor="middle">Kurikulum Merdeka</text>

  <!-- Badge 2: AI-powered -->
  <rect x="352" y="490" width="150" height="44" rx="22" fill="#0D9488" fill-opacity="0.15" stroke="#0D9488" stroke-width="1.5"/>
  <text x="427" y="518" font-size="19" font-weight="600"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#14B8A6" text-anchor="middle">AI-Powered</text>

  <!-- Badge 3: PAUD / TK -->
  <rect x="516" y="490" width="110" height="44" rx="22" fill="#0D9488" fill-opacity="0.15" stroke="#0D9488" stroke-width="1.5"/>
  <text x="571" y="518" font-size="19" font-weight="600"
    font-family="system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif"
    fill="#14B8A6" text-anchor="middle">PAUD/TK</text>

  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" rx="0">
    <animate attributeName="fill" dur="0s" fill="freeze" values="#0D9488"/>
  </rect>
  <rect x="0" y="610" width="1200" height="20" fill="#0D9488" opacity="0.7"/>
</svg>
